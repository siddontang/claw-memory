name = "claw-memory"
main = "src/index.ts"
compatibility_date = "2024-06-20"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# Registry TiDB connection — set these as secrets via:
#   wrangler secret put REGISTRY_HOST
#   wrangler secret put REGISTRY_USER
#   wrangler secret put REGISTRY_PASSWORD
#   wrangler secret put REGISTRY_DATABASE
